spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder_id}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder_secret}
            scope:
              - email
              - profile
  application:
    name: moneyops-backend
  
  # MongoDB: use MONGODB_URI (Atlas or local). Easy to share with team via Atlas free tier.
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/moneyops}
  # No JPA/datasource — using MongoDB

  kafka:
    bootstrap-servers: localhost:9092

server:
  port: 8000

jwt:
  secret: my-super-secret-key-that-is-at-least-256-bits-long-for-HS256-algorithm-must-be-longer
  expiration: 86400000  # 24 hours in milliseconds

logging:
  level:
    com.moneyops: DEBUG