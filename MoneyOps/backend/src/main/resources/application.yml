spring:
  config:
    import: optional:file:../.env[.properties]
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder_id}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder_secret}
            scope:
              - email
              - profile
  application:
    name: moneyops-backend

  # MongoDB Atlas — reads MONGODB_URI from root .env (set in environment before starting)
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/moneyops}
      # CRITICAL: standardized to plain string UUIDs (STANDARD) to avoid BinData(3) type mismatches.
      uuid-representation: STANDARD

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: ${MAIL_SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${MAIL_SMTP_STARTTLS:false}
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000


  kafka:
    enabled: ${KAFKA_ENABLED:false}
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:moneyops-group}
      auto-offset-reset: earliest
    producer:
      retries: 3
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}

server:
  port: ${BACKEND_PORT:8000}

jwt:
  secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-256-bits-long-for-HS256-algorithm-must-be-longer}
  expiration: ${JWT_EXPIRATION:86400000}

# Internal service-to-service token is read directly from env var INTERNAL_SERVICE_TOKEN
# by ServiceTokenFilter via @Value. No Spring property alias needed here — defining one
# with ${INTERNAL_SERVICE_TOKEN:...} causes a circular placeholder error.

logging:
  level:
    com.moneyops: DEBUG

app:
  mail:
    from-address: ${EMAIL_FROM_ADDRESS:no-reply@moneyops.local}
    from-name: ${EMAIL_FROM_NAME:MoneyOps}
