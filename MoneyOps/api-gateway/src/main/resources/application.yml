spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

      redis-rate-limiter:
        replenish-rate: 10
        burst-capacity: 20
        requested-tokens: 1

      routes:
        - id: auth-login
          uri: ${backend.core.url}
          predicates:
            - Path=/api/auth/login
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        - id: auth-register
          uri: ${backend.core.url}
          predicates:
            - Path=/api/auth/register
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@ipKeyResolver}"

        - id: auth-refresh
          uri: ${backend.core.url}
          predicates:
            - Path=/api/auth/refresh
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        - id: users-routes
          uri: ${backend.core.url}
          predicates:
            - Path=/api/users/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@userKeyResolver}"

        - id: organizations-routes
          uri: ${backend.core.url}
          predicates:
            - Path=/api/organizations/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@orgKeyResolver}"

        - id: clients-routes
          uri: ${backend.core.url}
          predicates:
            - Path=/api/clients/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@orgKeyResolver}"

        - id: invoices-routes
          uri: ${backend.core.url}
          predicates:
            - Path=/api/invoices/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@orgKeyResolver}"

        - id: transactions-routes
          uri: ${backend.core.url}
          predicates:
            - Path=/api/transactions/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@orgKeyResolver}"

        - id: documents-routes
          uri: ${backend.core.url}
          predicates:
            - Path=/api/documents/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@orgKeyResolver}"

        - id: ai-chat-routes
          uri: ${ai.gateway.url}
          predicates:
            - Path=/api/ai/chat/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@orgKeyResolver}"

        - id: ai-voice-routes
          uri: ${ai.gateway.url}
          predicates:
            - Path=/api/ai/voice/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 6
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@orgKeyResolver}"

        - id: voice-service-routes
          uri: ${voice.service.url}
          predicates:
            - Path=/api/voice/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@orgKeyResolver}"

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  lifecycle:
    timeout-per-shutdown-phase: 20s

backend:
  core:
    url: http://localhost:8000

ai:
  gateway:
    url: http://localhost:8001

voice:
  service:
    url: http://localhost:8003

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-your-256-bit-secret-your-256-bit-secret-your-256-bit-secret}
  expiration: 86400000

gateway:
  public-endpoints: /api/auth/login,/api/auth/register,/actuator/health,/actuator/ready
  tenant:
    enforce-isolation: true
    required-paths: /api/clients/**,/api/invoices/**,/api/transactions/**,/api/documents/**,/api/organizations/**
  logging:
    enabled: true
    log-request-body: false
    log-response-body: false
    slow-request-threshold-ms: 3000
  rate-limit:
    enabled: true
    fail-open: true
    presets:
      strict: 2
      normal: 10
      relaxed: 50
      ai: 5
    defaults:
      public-endpoints: 10
      authenticated-endpoints: 50
      tenant-endpoints: 30
      ai-endpoints: 5
      voice-endpoints: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true

logging:
  level:
    root: INFO
    com.moneyops.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: ${PORT:8080}
  shutdown: graceful
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false
